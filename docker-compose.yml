version: '3.8'

services:
  api_gateway:
    build: ./api_gateway
    ports:
      - "80:80"
    depends_on:
      - frontend
      - auth_service
      - space_service
      - booking_service
    networks:
      - deskspace_network

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - NODE_ENV=development
    networks:
      - deskspace_network

  auth_service:
    build:
      context: .
      dockerfile: ./auth_service/Dockerfile
    volumes:
      - ./auth_service:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgres://postgres:postgres@db_auth:5432/auth_db
      - SECRET_KEY=shared-secret-key-for-all-services-12345
    ports:
      - "8001:8001"
    depends_on:
      - db_auth
    networks:
      - deskspace_network

  db_auth:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - deskspace_network

  space_service:
    build:
      context: .
      dockerfile: ./space_service/Dockerfile
    volumes:
      - ./space_service:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgres://postgres:postgres@db_space:5432/space_db
      - SECRET_KEY=shared-secret-key-for-all-services-12345
    ports:
      - "8002:8002"
    depends_on:
      - db_space
    networks:
      - deskspace_network

  db_space:
    image: postgis/postgis:15-3.3-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: space_db
    volumes:
      - postgres_space_data:/var/lib/postgresql/data
    networks:
      - deskspace_network

  booking_service:
    build:
      context: .
      dockerfile: ./booking_service/Dockerfile
    volumes:
      - ./booking_service:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgres://postgres:postgres@db_booking:5432/booking_db
      - SECRET_KEY=shared-secret-key-for-all-services-12345
    ports:
      - "8003:8003"
    depends_on:
      - db_booking
    networks:
      - deskspace_network

  db_booking:
    image: postgres:15-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_db
    volumes:
      - postgres_booking_data:/var/lib/postgresql/data
    networks:
      - deskspace_network

volumes:
  postgres_auth_data:
  postgres_space_data:
  postgres_booking_data:

networks:
  deskspace_network:
    driver: bridge