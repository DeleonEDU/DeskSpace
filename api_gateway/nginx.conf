events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth_service:8001;
    }

    upstream space_service {
        server space_service:8002;
    }

    upstream booking_service {
        server booking_service:8003;
    }

    upstream payment_service {
        server payment_service:8004;
    }

    upstream notification_service {
        server notification_service:8005;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/spaces/ {
            proxy_pass http://space_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/bookings/ {
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/payments/ {
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
